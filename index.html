<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E&G Cleaning Services | Elite Home Care</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-main:#050505;
    --bg-surface:#0f0f0f;
    --text-main:#f8fafc;
    --emerald:#059669;
    --gold:#d4af37;
}

body{
    font-family:'Outfit',sans-serif;
    background:var(--bg-main);
    color:white;
    margin:0;
    overflow-x:hidden;
}

/* Animated background */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 30%, rgba(5,150,105,0.08), transparent),
    radial-gradient(circle at 80% 70%, rgba(212,175,55,0.08), transparent);
    animation:moveBg 20s linear infinite alternate;
    z-index:-2;
}
@keyframes moveBg{
    0%{transform:translate(0,0)}
    100%{transform:translate(-50px,-50px)}
}

/* reveal */
.reveal{
    opacity:0;
    transform:translateY(40px);
    transition:all 1s ease;
}
.reveal.visible{
    opacity:1;
    transform:translateY(0);
}

/* shimmer text */
.glow-text{
    background:linear-gradient(120deg,#fff,#fde047,#fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-size:200%;
    animation:shimmer 6s linear infinite;
}
@keyframes shimmer{
    0%{background-position:0%}
    100%{background-position:200%}
}

/* cards */
.card{
    background:rgba(15,15,15,0.6);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:2rem;
    padding:2rem;
    transition:.4s;
}
.card:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.7);
}

/* buttons */
.btn{
    background:linear-gradient(135deg,#fde047,#d4af37,#997a00);
    color:black;
    padding:14px 30px;
    border-radius:999px;
    font-weight:bold;
    position:relative;
    overflow:hidden;
}
.btn span{
    position:absolute;
    border-radius:50%;
    transform:scale(0);
    animation:ripple .6s linear;
    background:rgba(255,255,255,0.4);
}
@keyframes ripple{
    to{transform:scale(4);opacity:0}
}

/* particles */
#particles{
    position:fixed;
    inset:0;
    z-index:-1;
}

/* nav */
.nav-link{
    opacity:.6;
    transition:.3s;
}
.nav-link:hover{
    opacity:1;
    transform:translateY(-2px);
}

/* pages */
.page{
    display:none;
}
.page.active{
    display:block;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- NAV -->
<nav class="fixed w-full flex justify-between px-8 py-4 bg-black/80 backdrop-blur z-50">
<div onclick="showPage('home')" class="cursor-pointer font-bold">E&G</div>
<div class="flex gap-6 text-sm uppercase">
<button onclick="showPage('home')" class="nav-link">Home</button>
<button onclick="showPage('services')" class="nav-link">Services</button>
<button onclick="showPage('contact')" class="btn">Book</button>
</div>
</nav>

<div class="pt-32">

<!-- HOME -->
<section id="home" class="page active reveal text-center px-6">
<h1 class="text-6xl md:text-7xl">
Luxury is a <span class="glow-text italic">pristine</span> home.
</h1>
<p class="mt-6 text-zinc-400 max-w-xl mx-auto">
Premium residential cleaning with obsessive attention to detail.
</p>
<button onclick="showPage('contact')" class="btn mt-8">Get Quote</button>
</section>

<!-- SERVICES -->
<section id="services" class="page reveal px-6 mt-20">
<div class="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto">

<div class="card">
<h3 class="text-xl mb-2">Routine</h3>
<p class="text-zinc-400">$150+</p>
</div>

<div class="card">
<h3 class="text-xl mb-2">Deep Clean</h3>
<p class="text-zinc-400">$300+</p>
</div>

<div class="card">
<h3 class="text-xl mb-2">Move In/Out</h3>
<p class="text-zinc-400">Custom</p>
</div>

</div>
</section>

<!-- CONTACT -->
<section id="contact" class="page reveal text-center mt-20">
<h2 class="text-4xl mb-6">Start Your Quote</h2>
<input placeholder="Name" class="block mx-auto mb-4 p-3 bg-black border border-white/10">
<input placeholder="Email" class="block mx-auto mb-4 p-3 bg-black border border-white/10">
<button class="btn">Submit</button>
</section>

</div>

<script>
lucide.createIcons();

/* navigation */
function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
window.scrollTo({top:0});
}

/* reveal */
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting) e.target.classList.add('visible');
});
});
document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));

/* ripple */
document.querySelectorAll('.btn').forEach(btn=>{
btn.addEventListener('click',function(e){
const span=document.createElement('span');
span.style.width=span.style.height='100px';
span.style.left=e.offsetX+'px';
span.style.top=e.offsetY+'px';
this.appendChild(span);
setTimeout(()=>span.remove(),600);
});
});

/* particles */
const c=document.getElementById("particles");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let p=Array.from({length:40},()=>({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*2,
dx:Math.random()*0.3,
dy:Math.random()*0.3
}));

function anim(){
ctx.clearRect(0,0,c.width,c.height);
p.forEach(a=>{
a.x+=a.dx;
a.y+=a.dy;
if(a.x>c.width||a.y>c.height){a.x=0;a.y=0;}
ctx.beginPath();
ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,0.05)";
ctx.fill();
});
requestAnimationFrame(anim);
}
anim();
</script>

</body>
</html>
